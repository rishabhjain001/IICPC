syntax = "proto3";

package dbhp.botfleet.v1;

option go_package = "github.com/iicpc/dbhp/gen/go/dbhp/botfleet/v1;botfleetv1";

import "google/protobuf/empty.proto";

// BotFleetManager provisions and orchestrates Synthetic Trading Bot fleets.
// It is called by the Control Plane to start/stop bot workloads for a given
// Benchmark Run.
service BotFleetManager {
  // ProvisionFleet deploys the requested number of bots and streams progress
  // events until all bots reach READY or the deadline is exceeded.
  rpc ProvisionFleet(ProvisionRequest) returns (stream ProvisionEvent);

  // StopFleet gracefully terminates all bots in the fleet, forcibly killing
  // any that have not stopped after 30 seconds.
  rpc StopFleet(StopRequest) returns (google.protobuf.Empty);

  // GetFleetStatus returns an aggregate summary of the current fleet.
  rpc GetFleetStatus(FleetStatusRequest) returns (FleetStatus);
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

message ProvisionRequest {
  string benchmark_run_id = 1;

  // Total number of bots to provision (100 – 10 000).
  uint32 bot_count = 2;

  // Desired scenario mix. Percentages should sum to approximately 1.0.
  ScenarioDistribution distribution = 3;

  // List of endpoint IDs (sandbox internal IPs) the bots will connect to.
  // Populated from SandboxController.GetSandboxEndpoints.
  repeated string endpoint_ids = 4;
}

// ScenarioDistribution defines the fraction of bots assigned to each bot
// scenario type. Values are treated as weights; they do not need to sum to
// exactly 1.0 (the fleet manager normalises them).
message ScenarioDistribution {
  float market_maker_pct = 1;
  float aggressive_taker_pct = 2;
  float cancel_spammer_pct = 3;
  float mixed_retail_pct = 4;
  float latency_prober_pct = 5;
}

// ProvisionEvent is streamed back to the caller as bots transition through
// their lifecycle states.
message ProvisionEvent {
  // Number of bots currently in READY state.
  uint32 ready_count = 1;

  // Total bots requested.
  uint32 total_count = 2;

  // Phase description: SCHEDULING | STARTING | READY | TIMEOUT | FAILED
  string phase = 3;

  // Optional human-readable description.
  string message = 4;
}

message StopRequest {
  string benchmark_run_id = 1;
}

message FleetStatusRequest {
  string benchmark_run_id = 1;
}

message FleetStatus {
  string benchmark_run_id = 1;

  uint32 total_bots = 2;
  uint32 ready_bots = 3;
  uint32 running_bots = 4;
  uint32 throttling_bots = 5;
  uint32 terminated_bots = 6;

  // Messages per second aggregated across all running bots.
  uint64 aggregate_msg_per_sec = 7;
}
